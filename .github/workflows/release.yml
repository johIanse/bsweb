name: Build Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Build source and full dependency packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate release safety
        run: |
          set -euo pipefail
          forbidden='(bs\.hksp\.ltd|nas\.hksp\.ltd|/vol1/@apphome/trim\.openclaw/data/workspace/步数)'
          if grep -R -n -E "$forbidden" . \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude-dir=node_modules \
            --exclude='*.log'; then
            echo 'Forbidden local/domain string found in release source.' >&2
            exit 1
          fi
          test ! -f .env
          test ! -f config/database.php
          bash -n install.sh
          sh -n docker-entrypoint.sh
          sh -n docker-entrypoint.single.sh

      - name: Build clean source package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          VERSION="${VERSION//\//-}"
          NAME="step-system-${VERSION}"
          mkdir -p dist "$NAME"
          rsync -a ./ "$NAME"/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude '.env.bak.*' \
            --exclude 'config/database.php' \
            --exclude 'config/database.php.bak.*' \
            --exclude 'config/backup' \
            --exclude 'cleanup-unused-*' \
            --exclude '.acside' \
            --exclude 'node_modules' \
            --exclude 'storage/*.log' \
            --exclude 'storage/test_*.php' \
            --exclude 'storage/dump_*.php' \
            --exclude 'storage/framework' \
            --exclude 'storage/logs' \
            --exclude 'dist' \
            --exclude "$NAME"
          cat > "$NAME/RELEASE_INFO.txt" <<EOF
          Package: ${NAME}
          Type: clean source package
          Build: ${GITHUB_RUN_ID}

          Install single-container Docker:
            chmod +x install.sh
            sudo bash install.sh --single

          Install standard two-container Docker:
            chmod +x install.sh
            sudo bash install.sh --docker-repair
          EOF
          tar -czf "dist/${NAME}-source.tar.gz" "$NAME"
          zip -qr "dist/${NAME}-source.zip" "$NAME"

      - name: Build full dependency package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          VERSION="${VERSION//\//-}"
          SRC_NAME="step-system-${VERSION}"
          FULL_NAME="step-system-${VERSION}-full"
          cp -a "$SRC_NAME" "$FULL_NAME"
          npm install --prefix "$FULL_NAME" got@11 tough-cookie iconv-lite global-agent hpagent
          cat > "$FULL_NAME/RELEASE_INFO.txt" <<EOF
          Package: ${FULL_NAME}
          Type: full package with Node dependencies
          Build: ${GITHUB_RUN_ID}

          This package includes node_modules for non-Docker/native deployments.
          Docker deployments can still use install.sh; Docker images install their own dependencies.
          EOF
          tar -czf "dist/${FULL_NAME}.tar.gz" "$FULL_NAME"
          zip -qr "dist/${FULL_NAME}.zip" "$FULL_NAME"

      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: step-system-release-packages
          path: dist/*

      - name: Publish GitHub Release for tags
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  windows-sfx:
    name: Build Windows self-extracting exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows launcher exe and self-extracting archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "manual" }
          $version = $version.Replace('/', '-')
          $name = "step-system-$version-source"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path $name | Out-Null
          robocopy . $name /E /XD .git .github .acside node_modules config\backup /XF .env config\database.php *.log | Out-Null
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }
          @"
          Package: $name
          Type: Windows source archive with runnable launcher

          Files:
          - Start-StepSystem.exe: launches the single-container Docker deployment and opens browser
          - Stop-StepSystem.exe: stops the single-container Docker deployment, keeping data volume

          Requirement:
          - Docker Desktop must be installed and running.
          "@ | Set-Content -Encoding UTF8 "$name\RELEASE_INFO.txt"

          Install-Module ps2exe -Scope CurrentUser -Force
          Invoke-ps2exe "$name\tools\windows\Start-StepSystem.ps1" "$name\Start-StepSystem.exe" -title "步数系统启动器" -description "Step System Docker Launcher" -company "johIanse" -product "Step System" -noConsole:$false
          Invoke-ps2exe "$name\tools\windows\Stop-StepSystem.ps1" "$name\Stop-StepSystem.exe" -title "步数系统停止器" -description "Step System Docker Stopper" -company "johIanse" -product "Step System" -noConsole:$false

          Compress-Archive -Path "$name\*" -DestinationPath "dist\$name-windows-runnable.zip" -Force
          Copy-Item "$name\Start-StepSystem.exe" "dist\Start-StepSystem.exe"
          Copy-Item "$name\Stop-StepSystem.exe" "dist\Stop-StepSystem.exe"

      - name: Upload Windows runnable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: step-system-windows-runnable
          path: |
            dist/*windows-runnable.zip
            dist/Start-StepSystem.exe
            dist/Stop-StepSystem.exe

      - name: Publish Windows runnable artifacts for tag releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*windows-runnable.zip
            dist/Start-StepSystem.exe
            dist/Stop-StepSystem.exe

  windows-portable:
    name: Build Windows portable exe without Docker
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build portable package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "manual" }
          $version = $version.Replace('/', '-')
          $name = "step-system-$version-windows-portable"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path $name | Out-Null

          robocopy . $name /E /XD .git .github .acside config\backup data runtime /XF .env config\database.php *.log | Out-Null
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }

          npm install --prefix $name got@11 tough-cookie iconv-lite global-agent hpagent

          $nodePage = Invoke-WebRequest -UseBasicParsing -Uri "https://nodejs.org/dist/latest-v20.x/"
          $nodeZipName = [regex]::Match($nodePage.Content, 'node-v20\.[^"<>]+-win-x64\.zip').Value
          if (-not $nodeZipName) { throw "No suitable Node.js Windows x64 release found" }
          Invoke-WebRequest -Uri "https://nodejs.org/dist/latest-v20.x/$nodeZipName" -OutFile "node.zip"
          New-Item -ItemType Directory -Force -Path "$name\runtime\node-full" | Out-Null
          Expand-Archive node.zip -DestinationPath "$name\runtime\node-full" -Force
          $nodeDir = Get-ChildItem "$name\runtime\node-full" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "$name\runtime\node" | Out-Null
          Copy-Item "$($nodeDir.FullName)\node.exe" "$name\runtime\node\node.exe" -Force
          & "$name\runtime\node\node.exe" --version
          Remove-Item "$name\runtime\node-full" -Recurse -Force

          $releaseJson = Invoke-RestMethod -Uri "https://windows.php.net/downloads/releases/releases.json"
          $phpEntry = $releaseJson.PSObject.Properties | Where-Object { $_.Name -like "8.3*" -or $_.Name -eq "8.3" } | Select-Object -First 1
          if (-not $phpEntry) { $phpEntry = $releaseJson.PSObject.Properties | Where-Object { $_.Name -like "8.*" } | Select-Object -First 1 }
          $phpRel = $phpEntry.Value
          $variant = $phpRel.PSObject.Properties | Where-Object { $_.Name -match "nts.*x64|x64.*nts" } | Select-Object -First 1
          if (-not $variant) { $variant = $phpRel.PSObject.Properties | Where-Object { $_.Name -match "x64" } | Select-Object -First 1 }
          if (-not $variant) { throw "No suitable PHP Windows x64 release found" }
          $phpPath = $variant.Value.zip.path
          $phpUrl = "https://windows.php.net/downloads/releases/$phpPath"
          $phpZip = "php.zip"
          Invoke-WebRequest -Uri $phpUrl -OutFile $phpZip
          New-Item -ItemType Directory -Force -Path "$name\runtime\php" | Out-Null
          Expand-Archive $phpZip -DestinationPath "$name\runtime\php" -Force
          Copy-Item "$name\runtime\php\php.ini-production" "$name\runtime\php\php.ini" -Force
          Add-Content "$name\runtime\php\php.ini" "`nextension_dir=ext"
          Add-Content "$name\runtime\php\php.ini" "extension=pdo_sqlite"
          Add-Content "$name\runtime\php\php.ini" "extension=sqlite3"
          Add-Content "$name\runtime\php\php.ini" "extension=curl"
          Add-Content "$name\runtime\php\php.ini" "extension=mbstring"
          Add-Content "$name\runtime\php\php.ini" "date.timezone=Asia/Shanghai"

          @"
          Package: $name
          Type: Windows portable runnable package

          Usage:
          - Double-click StepSystem-Portable.exe
          - Default admin login: admin / admin
          - No Docker required
          - Runtime data is stored in data\step-system.sqlite

          Notes:
          - This package includes PHP for Windows, Node.js, and Node dependencies.
          - It runs a local web service at http://127.0.0.1:8088/
          - It also starts scheduler.php every 60 seconds for timed runs and whitelist heartbeat.
          - Default admin login: admin / admin
          "@ | Set-Content -Encoding UTF8 "$name\RELEASE_INFO.txt"

          Install-Module ps2exe -Scope CurrentUser -Force
          Invoke-ps2exe "$name\tools\windows\Start-StepSystem-Portable.ps1" "$name\StepSystem-Portable.exe" -title "步数系统单机版" -description "Step System Windows Portable" -company "johIanse" -product "Step System" -noConsole:$false

          Compress-Archive -Path "$name\*" -DestinationPath "dist\$name.zip" -Force
          Copy-Item "$name\StepSystem-Portable.exe" "dist\StepSystem-Portable.exe"

      - name: Upload Windows portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: step-system-windows-portable
          path: |
            dist/*windows-portable.zip
            dist/StepSystem-Portable.exe

      - name: Publish Windows portable artifacts for tag releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*windows-portable.zip
            dist/StepSystem-Portable.exe

  magisk-module:
    name: Build Magisk module package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Magisk module zip
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          VERSION="${VERSION//\//-}"
          NAME="step-system-${VERSION}-magisk"
          mkdir -p dist "$NAME"
          rsync -a magisk/stepsystem/ "$NAME"/
          mkdir -p "$NAME/web"
          rsync -a ./ "$NAME/web"/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'magisk' \
            --exclude '.env' \
            --exclude '.env.bak.*' \
            --exclude 'config/database.php' \
            --exclude 'config/database.php.bak.*' \
            --exclude 'config/backup' \
            --exclude 'cleanup-unused-*' \
            --exclude '.acside' \
            --exclude 'node_modules' \
            --exclude 'storage/*.log' \
            --exclude 'storage/test_*.php' \
            --exclude 'storage/dump_*.php' \
            --exclude 'storage/framework' \
            --exclude 'storage/logs' \
            --exclude 'runtime' \
            --exclude 'data' \
            --exclude 'dist' \
            --exclude "$NAME"
          npm install --prefix "$NAME/web" got@11 tough-cookie iconv-lite global-agent hpagent
          MODULE_DIR="$NAME" python3 tools/build-magisk-runtime.py
          test -x "$NAME/php/bin/php"
          test -x "$NAME/php/bin/node"
          test -f "$NAME/php/lib/php.ini"
          sed -i "s/^version=.*/version=${VERSION}/" "$NAME/module.prop"
          sed -i "s#http://127.0.0.1:8058/#http://127.0.0.1:8058/#" "$NAME/module.prop"
          cat >> "$NAME/README.txt" <<EOF
          Step System Magisk module

          Name: 步数管理
          URL: http://127.0.0.1:8058/
          Default admin: admin / admin
          Data: /data/adb/stepsystem/data/step-system.sqlite
          Service log: /sdcard/步数管理-service.log
          Scheduler log: /data/adb/stepsystem/logs/scheduler.log
          Action diagnostic log: /sdcard/步数管理-action.log
          EOF
          cd "$NAME"
          zip -qr "../dist/${NAME}.zip" .

      - name: Upload Magisk artifact
        uses: actions/upload-artifact@v4
        with:
          name: step-system-magisk-module
          path: dist/*-magisk.zip

      - name: Publish Magisk module for tag releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*-magisk.zip

